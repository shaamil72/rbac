<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RBAC — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1a1d23; }
    .login-card { border: none; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .login-card .card-header {
      background: #0d6efd;
      border-radius: 12px 12px 0 0;
      padding: 1.5rem;
      text-align: center;
    }
    .login-card .card-header h4 { color: #fff; margin: 0; font-weight: 600; letter-spacing: 1px; }
    .login-card .card-header small { color: rgba(255,255,255,0.7); }
  </style>
</head>
<body class="d-flex align-items-center min-vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-sm-8 col-md-5 col-lg-4">
        <div class="card login-card">
          <div class="card-header">
            <h4>RBAC System</h4>
            <small>User &amp; Access Management</small>
          </div>
          <div class="card-body p-4">
            <div id="error" class="alert alert-danger d-none py-2"></div>
            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" class="form-control" id="username" placeholder="admin" required autofocus>
              </div>
              <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Sign In</button>
            </form>
          </div>
        </div>
        <p class="text-center text-secondary mt-3 small">API docs: <a href="/docs" class="text-secondary">/docs</a></p>
      </div>
    </div>
  </div>
  <script>
    if (sessionStorage.getItem('token')) window.location.href = '/app';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error');
      errorDiv.classList.add('d-none');

      const res = await fetch('/auth/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
      });

      if (res.ok) {
        const data = await res.json();
        sessionStorage.setItem('token', data.access_token);
        sessionStorage.setItem('username', username);
        window.location.href = '/app';
      } else {
        const err = await res.json();
        errorDiv.textContent = err.detail || 'Login failed';
        errorDiv.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
